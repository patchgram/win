name: patchgram_gui
description: Patchgram for Windows — Flutter patcher (macOS-styled).
publish_to: "none"
version: 1.0.1+11

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  file_selector: ^1.0.0   # native "Choose App" / browse dialogs
  flutter_svg: ^2.0.0     # render the macOS section / logo SVGs
  url_launcher: ^6.2.0    # open the GitHub / Telegram links
  ffi: ^2.1.0             # native in-process injection (CreateRemoteThread + LoadLibrary) — no loader.exe

dev_dependencies:
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1   # generate the Windows app icon from app_icon.png

flutter:
  uses-material-design: true
  assets:
    - assets/

flutter_launcher_icons:
  windows:
    generate: true
    image_path: "assets/app_icon.png"
    icon_size: 256
